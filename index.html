<!DOCTYPE html>
<html lang="es">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>
    if (localStorage.getItem("sidebar_collapsed") === "true") {
      document.documentElement.classList.add("pre-collapsed");
    }
  </script>
  <title>MultiTareas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="/flav-icon.png">
  <style>
    :root{
      --bg:#09090b;
      --sidebar:#121214;
      --card:#18181b;
      --card2:#141416;
      --hover:#27272a;
      --text:#f4f4f5;
      --muted:#a1a1aa;
      --border:#27272a;
      --danger:#ef4444;
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --gradient-from:#8b5cf6;
      --gradient-to:#00ffaa;
      --accent: var(--gradient-from);
      --accent-soft: color-mix(in srgb, var(--gradient-to) 35%, transparent);
      --gradient-from-soft:rgba(139,92,246,.35);
      --gradient-to-soft:rgba(0,255,170,.25);
      --app-gradient: linear-gradient(135deg,var(--gradient-from),var(--gradient-to));
      --app-gradient-soft: linear-gradient(135deg,var(--gradient-from-soft),var(--gradient-to-soft));  
    }
    /* THEME: DEFAULT */
    :root.theme-default {
      --gradient-from:#8b5cf6;   
      --gradient-to:#00ffaa;     

      --gradient-from-soft:rgba(139,92,246,.35);
      --gradient-to-soft:rgba(0,255,170,.25);
    }
    /* THEME: AMATISTA */
    :root.theme-amatista {
      --gradient-from:#8b5cf6;
      --gradient-to:#ec4899;

      --gradient-from-soft:rgba(139,92,246,.35);
      --gradient-to-soft:rgba(236,72,153,.25);
    }
    /* THEME: LAVA */
    :root.theme-lava {
      --gradient-from:#dc2626;
      --gradient-to:#ff6a00;

      --gradient-from-soft:rgba(220,38,38,.35);
      --gradient-to-soft:rgba(255,106,0,.25);
    }
    /* THEME: ZAFIRO */
    :root.theme-zafiro {
      --gradient-from:#1e3a8a;   
      --gradient-to:#38bdf8;    

      --gradient-from-soft:rgba(30,58,138,.35);
      --gradient-to-soft:rgba(56,189,248,.25);
    }

    /* THEME: JADE */
    :root.theme-jade {
      --gradient-from:#047857;   
      --gradient-to:#2dd4bf;    

      --gradient-from-soft:rgba(4,120,87,.35);
      --gradient-to-soft:rgba(45,212,191,.25);
    }

    /* THEME: ATARDECER */
    :root.theme-atardecer {
      --gradient-from:#f97316;
      --gradient-to:#ec4899;

      --gradient-from-soft:rgba(249,115,22,.35);
      --gradient-to-soft:rgba(236,72,153,.25);
    }

    /* THEME: OPALO */
    :root.theme-opalo {
      --gradient-from:#d97706;   
      --gradient-to:#fff3b0;     

      --gradient-from-soft:rgba(217,119,6,.35);
      --gradient-to-soft:rgba(255,243,176,.25);
    }

    /* THEME: PINK BLISS */
    :root.theme-tulipan {
      --gradient-from:#ec4899;   
      --gradient-to:#ffe4f2;     

      --gradient-from-soft:rgba(236,72,153,.35);
      --gradient-to-soft:rgba(255,228,242,.25);
    }


    *{ box-sizing:border-box; margin:0; padding:0; font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body{
      height:100vh; display:flex; overflow:hidden; color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% 10%, var(--gradient-from-soft), transparent 55%),
        radial-gradient(900px 600px at 85% 20%, var(--gradient-to-soft), transparent 55%),
        var(--bg);
    }
    ::-webkit-scrollbar{ width:8px; height:8px; }
    ::-webkit-scrollbar-thumb{ background:var(--border); border-radius:999px; }
    ::-webkit-scrollbar-thumb:hover{ background:#3a3a3f; }

    html, body {
      touch-action: manipulation;
    }

    /* Sidebar */
    .sidebar{
      width:340px;
      min-width:340px;
      transition:
        width .35s cubic-bezier(.65,0,.35,1),
        min-width .35s cubic-bezier(.65,0,.35,1);
      height:100vh;               
      padding:20px;

      display:flex;
      flex-direction:column;
      gap:14px;

      background:
        linear-gradient(180deg, rgba(255,255,255,.02), transparent 35%),
        var(--sidebar);

      border-right:1px solid var(--border);
      overflow:hidden;
    }

    .sidebar.collapsed{
      width: 78px;
      min-width: 78px;
      padding:20px;
      padding-left: 20px;
      padding-right: 20px;
    }

    .sidebar-scroll,
    .login-button{
      transition: opacity .25s ease, transform .25s ease;
    }

    .sidebar.collapsed .sidebar-scroll,
    .sidebar.collapsed .login-button{
      opacity: 0;
      transform: translateX(-10px);
      pointer-events: none;
    }

    .sidebar.collapsed .logo{
      justify-content:center;
      align-items:center;
    }

    .sidebar.collapsed .brand{
      width:100%;
      justify-content:center;
      gap:0;
    }

    .sidebar.collapsed .app-logo-wrapper{
      transform:none;
    }

    .sidebar.collapsed .brand-title,
    .sidebar.collapsed .brand-meta{
      display: none;
    }

    .sidebar.collapsed .logo-actions{
      display:none;
    }

    .sidebar.collapsed .login-row{
      justify-content:center;
    }

    .sidebar-scroll{
      flex:1;
      min-height:0;
      overflow-y:auto;
      padding-right:4px;
      display:flex;
      flex-direction:column;
      gap:18px; /* ajustá este valor a gusto */
      transition: opacity .2s ease, transform .2s ease;

    }

    .sidebar.no-transition {
      transition: none !important;
    }

    .logo{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-shrink:0; }

    .badge{
      width:36px;
      height:36px;
      border-radius:12px;

      background: var(--app-gradient-soft);
      border:1px solid rgba(255,255,255,.12);

      display:grid;
      place-items:center;

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.15),
        0 10px 30px rgba(0,0,0,.35);

      backdrop-filter: blur(12px);

      transition: transform .2s ease, box-shadow .2s ease;
    }
    .badge:hover{
      transform: translateY(-2px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.25),
        0 15px 40px var(--gradient-to-soft);
    }
    .btn{
      border:1px solid var(--border);
      background: rgba(255,255,255,.02);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:700;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }
    .btn:hover{ transform: translateY(-1px); border-color:#34343a; background: rgba(255,255,255,.04); }
    .btn.primary{
      border:1px solid rgba(255,255,255,.12);
      background: var(--app-gradient-soft);
      backdrop-filter: blur(10px);
    }
    .btn.primary:hover{
      box-shadow:
        0 0 25px rgba(139,92,246,.3),
        0 0 40px rgba(16,185,129,.2);
    }

    .panel{
      background: linear-gradient(180deg, rgba(255,255,255,.02), transparent 40%), var(--card2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
    }
    .panel h3{ font-size:14px; font-weight:800; margin-bottom:8px; letter-spacing:-.2px; }
    .muted{ color:var(--muted); font-size:12px; line-height:1.4; }

    .month-panel {
      text-align: center;
    }

    .month-display {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;

      margin-top: 6px;

      background: var(--app-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      background-size: 200% 200%;
      animation: gradientMove 8s ease infinite;
    }

    /* Board */
    .board{
      display:flex;
      gap:14px;
      align-items:flex-start;
      min-width:max-content;
    }

    .board-wrapper{
      flex:1;
      display:flex;
      flex-direction:column;
      padding:22px;
      overflow-x:hidden;
      overflow-y:visible;
      min-height:0; 
      min-width:0; 
    }

    .board-scroll{
      flex:1;
      overflow-x:auto;
      overflow-y:auto;
      min-width:0;
    }

    .board-scroll::-webkit-scrollbar{
      height:6px;
    }

    .board-scroll::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.12);
    }

    .board-scroll::-webkit-scrollbar-corner {
      background: var(--bg);
    }

    .board-header{
      margin-bottom: 35px;
      padding-left: 10px;
    }

    .board-title{
      font-size: 32px;
      font-weight: 600;
      color: #fff;
      margin: 0;
    }

    .board-subtitle{
      font-size: 18px;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
    }

    .main-area{
      flex:1;
      display:flex;
      flex-direction:column;
      min-width:0; 
    }

    .top-bar{
      width:100%; 
      height:80px;
      display:flex;
      align-items:flex-start;
      justify-content:flex-end;
      padding-left:40px;
    }

    .top-actions{
      display:flex;
      gap:16px;
    }

    .col{
      min-width:320px;
      max-width:320px;
      border-radius:22px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,.04),
        rgba(255,255,255,.01)
      );
      backdrop-filter: blur(20px);
      border:1px solid rgba(255,255,255,.06);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.04),
        0 25px 50px rgba(0,0,0,.55);
      display:flex;
      flex-direction:column;
      overflow:visible;
      transition: all .25s ease;
    }
    .col:hover{ 
      border-color:#34343a; 
    }

    .col-head{
      padding:14px 14px 12px 14px;
      border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:flex-end; gap:10px;
    }
    .col-head > div:first-child{
      flex:1;
      min-width:0;
    }
    .col-title{ font-weight:900; letter-spacing:-.2px; }
    .col-sub{ font-size:12px; color:var(--muted); margin-top:4px; }
    .progress{
      height:6px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
      margin-top:10px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--gradient-from),var(--gradient-to));
      border-radius:999px;
      transition: width .3s ease;
    }

    .progress-wrapper{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
    }

    .progress{
      flex:1;
      height:6px;
      background:rgba(255,255,255,.08);
      border-radius:999px;
      overflow:hidden;
    }

    .progress-percent{
      font-size:12px;
      font-weight:600;
      
      color:var(--muted);
      min-width:32px;
      text-align:right;
    }

    .progress-percent.complete{
      color: var(--gradient-to);
      font-weight:700;
    }

    .col.today-highlight{
      border: 1px solid transparent;
      background:
        linear-gradient(#121214,#121214) padding-box,
        var(--app-gradient) border-box;
      position: relative;
      overflow: hidden;
    }
    .pill{
      font-size:12px; padding:6px 10px; border-radius:999px;
      border:1px solid var(--border);
      color:var(--muted);
      background: rgba(255,255,255,.02);
      white-space:nowrap;
    }
    .pill.today{
      border-color: var(--gradient-to);
      background: var(--gradient-to-soft);
      color: var(--text);
      font-weight:600;
    }

    .list{
      padding:12px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .task{
      background: rgba(18,18,20,.95);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      display:flex;
      gap:10px;
      cursor:pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      animation: slideIn .18s cubic-bezier(.16,1,.3,1);
    }

    .task:hover{ 
      transform: translateY(-2px); 
      border-color:#3b3b43; 
      background: rgba(18,18,20,1); 
    }

    .task.drag-hover{
      border-color: var(--gradient-from);
      box-shadow:
        0 0 12px var(--gradient-from-soft);
    }

    .cb{
      width:18px; height:18px;
      border-radius:6px;
      border:2px solid #6b6b76;
      display:grid; place-items:center;
      margin-top:2px;
      flex:0 0 auto;
      transition: all .15s ease;
    }
    .task.done .cb{ background: var(--accent); border-color: var(--accent); }
    .task.done .cb::after{ content:"✓"; color:#fff; font-size:12px; font-weight:900; }
    .tmain{ flex:1; display:flex; flex-direction:column; gap:6px; }
    .ttext{ font-size:14px; line-height:1.35; word-break:break-word; }
    .task.done .ttext{ text-decoration: line-through; color:var(--muted); opacity:.95; }
    .tmeta{ font-size:12px; color:var(--muted); }

    .drop-indicator{
      height:0;
      border-radius:14px;
      margin:4px 0;
      background: linear-gradient(
        90deg,
        var(--gradient-from-soft),
        var(--gradient-to-soft)
      );
      border:1px dashed var(--gradient-to);
      transition: height .18s cubic-bezier(.16,1,.3,1),
                  opacity .18s ease;
      opacity:0;
    }

    .drop-indicator.active{
      height:48px;   /* misma altura visual que task */
      opacity:1;
    }

    .icon{
      border:none; background:transparent; color:var(--muted);
      cursor:pointer; padding:6px; border-radius:10px;
      transition: background .15s ease, color .15s ease;
      flex:0 0 auto;
    }
    .icon:hover{ background: rgba(255,255,255,.04); color:var(--text); }
    .icon.danger:hover{
      background: rgba(239,68,68,.12);
      color: #ef4444;
      transform: scale(1.1);
    }

    .adder{
      padding:12px;
      border-top:1px solid var(--border);
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.12));
    }
    .input{
      width:100%;
      border:1px solid var(--border);
      background: rgba(255,255,255,.02);
      color:var(--text);
      border-radius:14px;
      padding:12px;
      outline:none;
      font-size:14px;
      transition: border-color .15s ease, background .15s ease;
    }
    .input:focus{
      border-color: var(--gradient-to);
      background: color-mix(in srgb, var(--gradient-to) 10%, transparent);
    }
    .input::placeholder{ color:#6b6b76; }

    @keyframes slideIn{
      from{ opacity:0; transform: translateY(-8px) scale(.99); }
      to{ opacity:1; transform: translateY(0) scale(1); }
    }

    .mini-calendar{
      margin-top:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .mini-calendar .month-title{
      font-weight:800;
      font-size:14px;
      letter-spacing:-.2px;
    }

    .mini-calendar .weekdays,
    .mini-calendar .days{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:6px;
      font-size:11px;
      text-align:center;
    }

    .mini-calendar .weekdays{
      color:var(--muted);
      font-weight:600;
    }

    .mini-calendar .day{
      padding:6px 0;
      border-radius:10px;
      background:rgba(255,255,255,.03);
      border:1px solid transparent;
      transition:.2s ease;
    }

    .mini-calendar .day:hover{
      background:rgba(255,255,255,.06);
    }

    .mini-calendar .day.today{
      background:var(--app-gradient-soft);
      border:1px solid rgba(255,255,255,.2);
      box-shadow:0 0 15px var(--gradient-from-soft);
      font-weight:700;
    }

    .mini-calendar .day.muted{
      opacity:.3;
    }

    .mini-calendar .day.other-month{
      opacity:.25;
      background:rgba(255,255,255,.015);
      border:1px solid transparent;
    }

    .calendar-nav{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .cal-btn{
      width:28px;
      height:28px;
      border-radius:8px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      cursor:pointer;
      font-weight:700;
      transition:.2s ease;
    }

    .cal-btn:hover{
      background:var(--app-gradient-soft);
      border-color:var(--gradient-to);
    }

    .month-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .month-nav-btn{
      width:28px;
      height:28px;
      border-radius:8px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      color:var(--text);
      cursor:pointer;
      font-weight:700;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.2s ease;
    }

    .month-nav-btn:hover{
      background:var(--app-gradient-soft);
      border-color:var(--gradient-to);
    }

    .changelog-title{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .changelog-version{
      font-size:12px;
      font-weight:600;
      color:#cfcfd4; /* gris más claro que el título */
      opacity:.85;
    }

    /* Modal calendar */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 40px;
    }
    .overlay.open{ display:flex; }
    .modal{
      width: min(480px, calc(100vw - 40px));
      border-radius:18px;
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%), var(--sidebar);
      box-shadow: var(--shadow);
      overflow:hidden;
      transform: translateY(0);
      animation: pop .16s ease-out;
    }
    @keyframes pop{
      from{ opacity:0; transform: translateY(16px) scale(.985); }
      to{ opacity:1; transform: translateY(0) scale(1); }
    }

    /* Modal específico de temas */
    #themeOverlay .modal{
      width: min(520px, 92vw);
      border-radius:16px;
    }

    #themeOverlay .mbody{
      padding:16px;
    }

    .modal .col {
      min-width: 100%;
      max-width: 100%;
    }
    .mhead{
      padding:14px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .mhead strong{ font-size:14px; letter-spacing:-.2px; }
    .mhead span{ font-size:12px; color:var(--muted); display:block; margin-top:2px; }
    .mbody{ padding:14px; display:grid; gap:12px; }
    .calhead{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .calhead .month{ font-weight:900; letter-spacing:-.2px; }
    .nav{ display:flex; gap:8px; }
    .grid{ display:grid; grid-template-columns: repeat(7, 1fr); gap:8px; }
    .dow{ color:var(--muted); font-size:12px; text-align:center; padding:4px 0; }
    .day{
      height:44px;
      border-radius:14px;
      border:1px solid transparent;
      background: rgba(255,255,255,.02);

      display:flex;
      align-items:flex-start;      /* 👈 antes centrado */
      justify-content:center;

      padding-top:6px;             /* 👈 sube el número */

      cursor:pointer;
      position:relative;
      transition:.2s ease;
      user-select:none;
    }
    .day:hover{ transform: translateY(-1px); border-color:#34343a; background: rgba(255,255,255,.035); }
    .day.muted{ opacity:.3; pointer-events:none; }
    .day.today{ border-color: rgba(139,92,246,.35); }
    .day.selected{ border-color: rgba(139,92,246,.75); background: rgba(139,92,246,.16); }
    .day-number{
      position:relative;
      z-index:1;
    }

    .dot{
      position:absolute;
      bottom:6px;
      width:7px;
      height:7px;
      border-radius:999px;

      background: var(--gradient-to);      /* 👈 cambio */
      box-shadow: 0 0 8px var(--gradient-to);

      opacity:.95;
    }
    .mfoot{
      padding:0 14px 14px 14px;
      display:flex; gap:10px; justify-content:flex-end; align-items:center;
    }
    @keyframes rewardGlow {
      0% {
        box-shadow: 0 0 0 rgba(139,92,246,0);
        transform: scale(1);
      }
      40% {
        box-shadow:
          0 0 20px rgba(139,92,246,.6),
          0 0 40px rgba(16,185,129,.4);
        transform: scale(1.04);
      }
      100% {
        box-shadow: 0 0 0 rgba(139,92,246,0);
        transform: scale(1);
      }
    }

    .task.reward {
      animation: rewardGlow .5s cubic-bezier(.16,1,.3,1);
    }

    .changelog .version{
      font-weight:800;
      margin-bottom:6px;
      color:#ded6ff;
    }

    .changelog ul{
      padding-left:16px;
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .changelog li{
      font-size:12px;
      opacity:.85;
    }
    
    .edit-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--gradient-from);
      border-radius: 8px;
      padding: 6px 8px;
      color: white;
      font-size: inherit;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease;
    }

    .edit-input:focus {
      border-color: var(--gradient-to);
      box-shadow:
        0 0 0 2px var(--gradient-from-soft),
        0 0 12px var(--gradient-to-soft);
    }
    /*PREVIEW DE TEMAS*/
    .preview-default{
      background:linear-gradient(135deg,#8b5cf6,#00ffaa);
    }
